# =============================================================================
# 人味注入规则（Human Touch Rules）
# 叙事空间创作系统 v8.4
# =============================================================================
# 本规则解决 AI 生成文本「冰冷机械感」的根源问题
# 在生成阶段就注入人味，而非仅依赖事后 humanizer 精洗
# 规则编入 write_constraints 编译流程，每章/每回合生效
# v8.4 新增：ht_08~ht_12（顶级网文人味规则）
# 基于《我在精神病院学斩神》《天启预报》《龙族》《诡秘之主》真实文本深度提炼
# =============================================================================

core_philosophy: |
  人类写手的文字有「体温」，核心来源于六点：
  1. 不完美——人类会犹豫、跑题、说废话、前后微妙矛盾
  2. 具身感——人类通过身体感知世界，文字里带着皮肤的温度和肌肉的记忆
  3. 节奏呼吸——人类写作有呼吸感，不是匀速的信息输出机器
  4. 日常与宏大的碰撞——用极度接地气的细节冲撞宏大设定，制造真实世界感
  5. 记忆闪回——当前感官/情绪触发极短个人记忆片段，制造「这个人活在时间里」的感觉
  6. 间接人性刻画——不直接写内心，而是通过他人视角、微小动作、他人误解来体现人性深度
  
  本规则的目标不是「模仿人类的缺点」，而是「植入这个人真的活过、这个世界真的存在过的生命痕迹」。

# -----------------------------------------------------------------------------
# 全局频率配置
# -----------------------------------------------------------------------------
global_frequency:
  base_unit: "chapter"
  fallback_word_count: true
  chapter_length_assumption: 4000
  density_note: "所有 frequency 均以此为基准调整；hot 温度下增加频率，cold 温度下减半"

# -----------------------------------------------------------------------------
# 规则一：不完美注入（Imperfection Injection）
# -----------------------------------------------------------------------------
imperfection_injection:
  id: "ht_01"
  priority: "中（不得因执行此规则而破坏爽感节奏和剧情逻辑）"
  rules:
    character_self_mockery:
      description: "主角偶尔自嘲、吐槽、内心碎碎念"
      frequency: "每 2000 字至少出现 1 次"
      examples:
        - "真是谢谢了，出门没看黄历。"
        - "（他忽然觉得自己像个傻子。）"
        - "又来。每次最紧要的关头，这破系统都要卡个加载。"
      constraints:
        - "自嘲必须符合角色人设，不能让冷酷角色突然卖萌"
        - "紧张度 > 8 的生死场景中禁止出现轻浮自嘲"

    dialogue_imperfection:
      description: "对话中允许废话、重复、打断、改口"
      frequency: "每场关键对话至少出现 1 处"
      examples:
        - "「我……不，算了。」他吞回了那句话。"
        - "「你听我说——不是这样的，我是说……」"
        - "「啊？哦。哦，行吧。」（明显没听进去。）"
      constraints:
        - "不完美对话只用于塑造角色真实感，不得用于灌水"
        - "作为推进剧情的关键台词（如揭秘/宣战）不允许结巴改口"

    narrator_drift:
      description: "叙述者偶尔微妙跑题——一个短暂的联想或不相干的细节"
      frequency: "每 3000-5000 字出现 1 次，极其克制"
      examples:
        - "门廊上的那盆绿萝已经枯了一半。没人浇过它。（也许是上个月搬走的那个人的。）"
        - "他盯着自己的手背——不知道为什么，忽然想起小时候被蜂蜇的那个下午。那天下着雨。"
      constraints:
        - "跑题段落 ≤ 30 字"
        - "必须与角色当前情绪有隐性关联"
        - "禁止在高潮段落跑题"

# -----------------------------------------------------------------------------
# 规则二：节奏呼吸（Rhythm Breaking）
# -----------------------------------------------------------------------------
rhythm_breaking:
  id: "ht_02"
  priority: "中高"
  rules:
    sudden_slowdown:
      description: "连续紧密叙事后突然插入一段极慢的、散文化的段落"
      trigger: "连续 3 段以上的快节奏（平均句长 < 15 字）之后"
      effect: "插入一段 50-100 字的慢节奏段落（感官/环境/心理）"
      example: |
        （连续三段激烈战斗后——）
        风停了。
        他半跪在碎石堆里，耳鸣尖锐得像有人在脑子里拉小提琴。
        嘴里全是血的铁锈味。左手不听使唤了。
        天空很蓝。蓝得不像是刚打完一场的天。

    breath_pause:
      description: "在情绪高点的前一刻制造一个违反直觉的停顿"
      example: |
        他握住了剑柄。
        然后——什么都没做。
        就只是站在那里。呼吸。一下。两下。
        第三下的时候，他拔剑了。
      effect: "停顿制造期待感，比直接爆发更有冲击力"

    rhythm_variation:
      description: "刻意安排段落长度的大幅波动"
      rule: "每 5 段至少有 1 段长度是其他段落的 2 倍以上或 1/3 以下"
      forbidden: "禁止连续 5 段以上长度近似（±20%以内）"

# -----------------------------------------------------------------------------
# 规则三：感官锚定（Sensory Anchoring）
# -----------------------------------------------------------------------------
sensory_anchoring:
  id: "ht_03"
  priority: "高（此规则是人味的核心来源之一）"
  rules:
    non_visual_mandatory:
      description: "每 500 字至少 1 个非视觉感官细节"
      sensory_types:
        touch: "脚踝扭伤的痛/衣领处皮肤的痒/握刀柄时掌心的汗黏/被风吹干的嘴唇"
        smell: "嘴巴里铁锈味的血/雨后泥土的湿气/火药残留的硫磺味/对手身上的酒气"
        taste: "紧张时嘴里发苦/咬破舌尖的铜腥味/吞咽口水的干涩"
        hearing: "心跳在耳膜里擂鼓/骨头被捏碎的声音/安静到能听见自己的呼吸"
        temperature: "后背被冷汗浸透/从掌心蔓延的灼烧感/指尖冻僵到发麻"
        proprioception: "膝盖发软/胃里翻搅/太阳穴突突跳/牙关咬得发酸"

    concreteness_rule:
      description: "感官描写必须具体到身体部位，禁止抽象化"
      forbidden:
        - "一股寒意袭来" # → 改为：后脊梁猛地一紧，寒意从尾椎往上窜
        - "身体传来疼痛" # → 改为：左肋断了至少两根，每次呼吸都像在里面捅刀子
        - "感到一阵不适" # → 改为：胃酸翻上来堵在喉咙口，他硬是咽了回去
      required: "必须指明：哪个部位 + 什么感觉 + 什么程度"
      metaphor_boundary: |
        ht_03 优先使用直接身体描写，而非修辞比喻。
        若使用比喻辅助感官锚定，长度必须 ≤10 字，且不得命中 style_rules.yaml 禁用比喻列表。
        正例（直接）：「后脊梁猛地一紧，寒意从尾椎往上窜」
        误区（套路比喻）：「像溺水之人抓住浮木」→ 此类命中 style_rules 禁用词

    unconscious_interaction:
      id: "ht_03_ext"
      description: "无意识交互——主角深思/对峙/长对话时，强制与周围非关键物品进行一次无意义的物理交互（v8.4 新增）"
      frequency: "每 2000-3000 字出现 1 次"
      examples:
        - "他想着，手指无意识地把玩着桌上的打火机。打了两下，火没点着。"
        - "谈判陷入僵局。她用鞋尖轻轻踢了踢地砖缝里的一粒碎石。"
        - "他站在路口想了很久，发现自己一直在用拇指抠大拇指指甲盖。"
      constraints:
        - "交互对象必须是非关键道具（打火机/石子/桌角/外套拉链）"
        - "描写 ≤ 20 字，绝不能成为段落重心"
        - "禁止让无意识交互暗示剧情提示（如握剑柄 = 准备攻击，不算）"
        - "热温度（hot≥7）的高速战斗段落禁用此规则"

# -----------------------------------------------------------------------------
# 规则四：内心独白真实性（Inner Voice Authenticity）
# -----------------------------------------------------------------------------
inner_voice_authenticity:
  id: "ht_04"
  priority: "中"
  rules:
    allow_negativity:
      description: "允许主角发牢骚、吐槽、说丧话、自我怀疑"
      examples:
        - "累了。真的累了。不想打了。——但他还是站了起来。"
        - "赢了又怎样。反正下一个更强的已经在路上了。"
        - "（有那么一瞬间他想过直接跑。不丢人。识时务者为俊杰。）"
      constraints:
        - "负面独白必须在 3 句内被打断（被行动/外部事件/自我否定中断）"
        - "禁止让负面独白成为段落主题——它是调味料，不是主菜"
        - "爽感关键时刻（打脸/升级/获奖）禁止出现自我怀疑"

    thought_fragments:
      description: "内心独白允许碎片化、不成句"
      examples:
        - "不行。绝对不行。太蠢了。——但如果……"
        - "妈的。"
        - "他只有一个念头：活下去。"
      rule: "碎片化独白只适用于 hot 温度（≥ 7），cold/warm 温度下保持完整句"

    dialogue_mismatch:
      id: "ht_04_ext_a"
      description: "对话错位感——角色偶尔用沉默、转移话题或反问不相干问题来回应（v8.4 新增）"
      frequency: "每场关键博弈对话 1 次"
      examples:
        - "对方问：「你为什么叛变？」主角沉默三秒，然后问：「你今天吃饭了吗？」"
        - "对方逼供，主角偏头看向窗外：「外面好像要下雨了。」"
        - "对方声泪俱下，主角只是说：「嗯。」然后转身离开。"
      constraints:
        - "仅用于存在明显潜台词的博弈场景或亲密/对抗关系对话"
        - "禁止用于需要角色明确表态的关键剧情推进台词"
        - "每章最多 2 次，避免角色显得逃避或欠考虑"

    cognitive_blindspot:
      id: "ht_04_ext_b"
      description: "认知遮蔽——角色获取新信息时先产生一次符合人设的轻度误判，随后被纠正（v8.4 新增）"
      frequency: "每次重大信息揭露时 1 次"
      examples:
        - "他看到地图上的血迹，以为是动物的。直到注意到血迹的形状——那是一个指印。"
        - "主角听到背后的脚步声，以为是追兵。转身后才发现是自己的影子在灯光下移动。"
        - "她说她爱他。他第一反应是：谎言。后来他才明白，有时候人可以说谎，但眼睛不会撒谎的时候除外。"
      constraints:
        - "误判必须符合角色人设和当前信息量（不得让角色显得蠢）"
        - "纠正必须通过新的感官细节或事件触发，禁止大段内心推理解说"
        - "禁止在角色已有明确认知的设定中强行误判"

# -----------------------------------------------------------------------------
# 规则五：微小矛盾（Micro Contradiction）
# -----------------------------------------------------------------------------
micro_contradiction:
  id: "ht_05"
  priority: "低（锦上添花，不强制）"
  rules:
    say_do_mismatch:
      description: "角色偶尔言行轻微不一致"
      frequency: "每 3000-5000 字出现 1 次"
      examples:
        - "「没什么，不疼。」他说。手指却不自觉地攥紧了衣角。"
        - "「我不在乎。」她头也不回地走了。——走到转角的时候脚步慢了一拍。"
        - "他说着「冷静」，嗓子却在发抖。"
      constraints:
        - "矛盾方向必须是「表面坚强内心脆弱」或「嘴上否认身体诚实」"
        - "不允许出现让角色显得虚伪或人品有问题的矛盾"
        - "矛盾细节 ≤ 15 字，一笔带过即可"

# -----------------------------------------------------------------------------
# 规则六：叙事距离变换（Narrative Distance Shift）
# -----------------------------------------------------------------------------
narrative_distance_shift:
  id: "ht_06"
  priority: "高"
  rules:
    distance_levels:
      far:
        description: "旁观视角——叙述者客观描述事件"
        when: "cold 温度 + 低压场景 + 群像叙事"
        example: "人群散了。街道恢复了秩序。只有墙角的那滩血还没干。"
      
      medium:
        description: "贴近视角——叙述者跟着角色移动"
        when: "warm 温度 + 常规场景"
        example: "他推开门，玄关的灯没亮。鞋柜上落了一层灰。"
      
      close:
        description: "贴身视角——几乎是角色的意识流"
        when: "hot 温度 + 高压场景"
        example: "心脏。心脏在跳。不对，太快了。手在抖。剑也在抖。管他的——"
    
    shift_rules:
      - "叙事距离必须随情绪温度同步变化"
      - "危机到来时拉近，危机解除后拉远"
      - "同一段落内不得跳变叙事距离"
      - "距离变化通过句式自然实现，不需要标注"

# -----------------------------------------------------------------------------
# 规则八：记忆碎片化（Memory Fragmentation）v8.3 新增
# -----------------------------------------------------------------------------
memory_fragmentation:
  id: "ht_08"
  priority: "中高"
  description: "当前感官/情绪触发极短个人记忆片段，制造『这个人活在时间里』的感觉"
  frequency: "每 2500-4000 字 1 次（hot 温度频率增加至每 1500 字）"
  rules:
    fragment_length: "≤25 字，必须一闪而过，禁止展开成完整故事"
    trigger_condition: "当前感官/情绪与过去某刻产生共振（气味/触觉/声音触发效果最好）"
    examples:
      - "刀刃划过时，他忽然闻到小时候母亲煎鱼的油烟味。那年他八岁。"
      - "雨水顺着脸颊流进领口，像当年在老家屋檐下躲雨时一样冰。"
      - "握住命运之书时，他忽然想起第一次拉大提琴时手指的颤动。"
    constraints:
      - "记忆必须与当前身体感官直接挂钩，禁止无缘无故触发"
      - "禁止用于解释背景或灌设定（记忆片段本身不能包含世界观信息）"
      - "cold 温度下频率减半"

# -----------------------------------------------------------------------------
# 规则九：日常-宏大对比注入（Mundane vs Grand Contrast）v8.4 新增
# -----------------------------------------------------------------------------
mundane_grand_contrast:
  id: "ht_09"
  priority: "高（网文吸粉神技）"
  description: "用极度日常、接地气的细节，去冲撞宏大/克系/末世设定，制造『真实世界感』"
  frequency: "每 1500-2500 字出现 1 次（warm/hot 温度必触发）"
  examples:
    - "姨妈心疼地擦着油桶：『这么大一桶油，得花不少钱吧？』……而林七夜脑子里想的却是月球上的炽天使。"
    - "他握着命运之书准备屠神，却先低头确认了一下今天晚饭吃什么。"
    - "焚风裹着灰尘扑面而来，像把全世界煮沸。他忽然想起以前吃铁板烧的那个晚上。"
  constraints:
    - "日常细节必须具体到『生活琐碎』层级（食物/零钱/家电/身体感受）"
    - "宏大元素只闪现 1-2 句，不解释，不说教"
    - "两者的连接必须服务于情绪或角色弧光，禁止强行拼接"
    - "cold 温度下禁用（冷叙事不适合此种温馨冲撞）"

# -----------------------------------------------------------------------------
# 规则十：哲学比喻接地气（Philosophical Metaphor Grounding）v8.4 新增
# -----------------------------------------------------------------------------
philosophical_metaphor:
  id: "ht_10"
  priority: "中高"
  description: "用最日常的比喻，把高深哲学/世界观轻轻点出，绝不生硬说教"
  frequency: "每 2000-3000 字 1 次（hot 温度可增加至每 1500 字）"
  examples:
    - "命运就像一张被反复揉皱的草稿纸，你以为自己改写了结局，其实只是换了一张新纸。"
    - "他忽然觉得，活下去这件事，比打败月球上的天使更难。"
    - "人类真是残忍啊……一开始吞吃雷和火，焚烧旷野，挖掘煤矿，然后抽取石油……"
  constraints:
    - "比喻必须来自角色当下的感官/经历，禁止空降哲学"
    - "长度 ≤ 40 字，一笔带过，没有说教展开"
    - "禁止使用 style_rules.yaml 中的禁用比喻套路"
    - "cold 温度可用（冷哲思符合冷叙事气质），但频率减半"

# -----------------------------------------------------------------------------
# 规则十一：间接人性刻画（Indirect Humanity Portrayal）v8.4 新增
# -----------------------------------------------------------------------------
indirect_humanity:
  id: "ht_11"
  priority: "高"
  description: "不直接写主角内心，而是通过他人视角、微小动作、他人误解来体现人性深度"
  frequency: "每 3000 字至少 1 处（可与 ht_05 微小矛盾结合使用）"
  examples:
    - "姨妈说：『七夜这孩子外冷内热』……林七夜黑缎下的眼睛却湿了。"
    - "大家都以为他是冷酷的守夜人，只有纪念知道他最怕欠人情。"
    - "路人们窃窃私语说他 cos 盲僧，只有他自己知道，那块黑布下面藏着十年的黑暗。"
  constraints:
    - "必须通过『他人视角/他人误解/旁观者的侧写』来实现，禁止主角自己大段内心独白解释"
    - "他人的描述或误解必须与真相产生戏剧性落差，落差本身就是人味"
    - "每章最多 2 处，保持稀缺性"

# -----------------------------------------------------------------------------
# 规则十二：循环/重复母题痕迹（Motif Echo）v8.4 新增
# -----------------------------------------------------------------------------
motif_echo:
  id: "ht_12"
  priority: "中（长篇神器）"
  description: "让同一个小细节/动作/意象在全书反复出现，制造『这个人真的活在同一个世界里』的生命感"
  frequency: "每 5000 字至少 1 次呼应（可跨章节）"
  examples:
    - "敲门声：梦里敲诸神精神病院的门，现实里敲事务所的门，结局又敲星空。"
    - "铁板烧比喻：序章用来感慨世界毁灭，后文用来感慨人性残忍——同一意象，情感层层递进。"
    - "雨夜/雨中奔跑：在不同人生阶段反复出现，象征不同但情感统一。"
  constraints:
    - "每次呼应必须有细微变化——情感升级，不是机械重复"
    - "禁止生硬重复，必须自然融入当前场景，让读者自己发现"
    - "最好在规划阶段就在 Scene Plan 中预埋 motif，避免事后硬塞"
    - "第一次出现时不刻意标注，自然展示即可"

# -----------------------------------------------------------------------------
# 与其他系统的协作（v8.4 扩展版）
# -----------------------------------------------------------------------------
integration:
  priority_hierarchy: |
    DNA 模块 > writing_rules（爽感）> human_touch_rules（人味）> style_rules（语法约束）
    冲突时按此优先级消解。

  conflict_resolutions:
    ht_01_vs_wr11: |
      ht_01（不完美注入）允许的角色自嘲/对话废话/叙述者微跑题 ≠ wr_11 禁止的信息重复。
      区分标准：ht_01 目标是「角色声音质感」（人味），wr_11 目标是「剧情信息冗余」（节奏）。
      裁定：同一内容若同时命中两条规则，以 ht_01 的声音质感判断为主——若是角色说话方式的自然流露，放行；若是重复交代同一剧情事实，不放行。
    ht_07_vs_style_rules: |
      ht_07 允许叙述者口语化介入（「总之事情就这么变得一团糟了」）≠ style_rules 禁止的编辑性评论。
      区分标准：口语化串联（≤15字，气氛打圆场）允许；价值判断/总结性评论/上帝视角解说 禁止。
      正例：「按理说这时候应该跑。他没跑。」（口语化，打破读者预期）
      反例：「这说明他其实内心是孤独的。」（编辑性解说，禁止）

  with_emotional_temperature: |
    温度等级与各规则执行强度映射（v8.4 完整版）：
    
    规则       | cold(1-3)      | warm(4-6)      | hot(7-10)
    ht_01      | 频率减半       | 标准           | 标准
    ht_02      | 标准           | 标准           | 频率翻倍
    ht_03      | 仅功能性感官   | 标准           | 频率翻倍
    ht_04      | 关闭           | 标准           | 开启碎片化独白
    ht_05      | 标准           | 标准           | 标准
    ht_06      | 远距离         | 中距离         | 近距离贴身
    ht_07      | 频率减半       | 标准           | 标准
    ht_08      | 频率减半       | 标准           | 频率增加（每1500字）
    ht_09      | 禁用           | 标准           | 必触发
    ht_10      | 频率减半       | 标准           | 频率增加
    ht_11      | 频率减半       | 标准           | 频率增加
    ht_12      | 标准           | 标准           | 标准
    
    跨规则协作：ht_03 的感官锚定频率受温度 sensory_density_override 字段覆盖（见 emotional_temperature.yaml）
  
  with_writing_rules: |
    冲突时优先级：writing_rules（爽感）> human_touch_rules（人味）。
    爽感关键时刻（打脸/升级/获奖/高潮战斗）禁止自我怀疑（ht_04 让位 wr_01）。
  
  with_style_rules: |
    ht_03 感官描写必须遵守 style_rules.yaml 禁用词列表。
    ht_03 的感官锚定首选直接身体描写；若使用比喻，≤10字且不命中 style_rules 禁用比喻。
  
  with_dna_module: |
    行文DNA模块优先级高于本规则。
    若 DNA 模块要求特定句式节奏或描写密度，以 DNA 为准。
    本规则作为 DNA 模块的补充层——DNA 解决「像某个人类」，本规则解决「像人类」。

  with_prompting_workflow: |
    本规则在 write_constraints 编译后必须转化为「硬约束 + 软示例 + 后置检查」三层：
    1. 硬约束：写在 system prompt 最前面（ht_03 感官密度、ht_07 叙述者规则）
    2. 软示例：在 few-shot 里各放 1-2 处真实体现（ht_08 记忆闪回、ht_09 日常冲撞）
    3. 后置检查：生成后用 self_checklist_v8.4 自检

# -----------------------------------------------------------------------------
# 最终自检清单 v8.4（生成后必须执行）
# -----------------------------------------------------------------------------
self_checklist_v8.4:
  - "ht_03：本章是否有至少 X 个具体非视觉感官？（X = 章节字数 / 400）"
  - "ht_08：是否至少出现 1 次记忆闪回（≤25字，感官触发，非灌设定）？"
  - "ht_09：是否有 1 处日常细节 vs 宏大设定的冲撞？"
  - "ht_10：是否有 1 处接地气哲学比喻（≤40字，不说教）？"
  - "ht_11：是否有 1 处通过他人误解/旁观者视角体现主角人性深度？"
  - "ht_12：本章是否有 motif 母题呼应，或已为后续埋下新母题？"
  - "rhythm_variation：段落长度是否有明显波动（有长段也有极短段）？"
  - "unconscious_interaction：深思/对峙/长对话时是否有一次无意义物理交互？"
  - "整体：读者读完后会不会觉得『这个世界和角色真的活过』？"

# -----------------------------------------------------------------------------
# 规则七：叙述者口吻人格化（Narrator Voice Humanization）v8.2 新增
# -----------------------------------------------------------------------------
narrator_voice_humanization:
  id: "ht_07"
  priority: "中（互动模式专项强化，流水线模式按常规执行）"
  core_idea: |
    叙述文字不是机器人的报告，是一个有点嘴碎、有时主观、偶尔会开小差的人在说故事。
    叙述者偶尔可以：用口语化短语串联场景、给读者一个非正式的提示、对剧情发展发一句牢骚。
    这不是写作缺陷，是人类写手的正常行文习惯。
  rules:
    narrator_intrusion:
      description: "叙述段落中偶尔允许口语化叙述者介入，打破纯第三人称的客观疏离感"
      frequency: "每 500 字出现 1-2 处，不能太密集"
      examples:
        - "总之，事情就这么变得一团糟了。"
        - "然后——然后事情就离谱了。"
        - "这话说出来很蠢，但他真的这么想的。"
        - "按理说这时候应该跑。他没跑。"
        - "说实话，这一着棋真的很妙。"
      constraints:
        - "叙述者介入不得打破 POV 锁定（仍为主角视角）"
        - "每章最多 3-4 处叙述者介入，避免滥用导致油腻"
        - "高潮战斗段落禁止叙述者介入（破坏紧张感）"
        - "介入句必须简短，≤15 字"
    incomplete_sentence_allowed:
      description: "非正式叙述允许不完整句，尤其是情绪高压时"
      examples:
        - "不行。绝对不行。"
        - "安静。太安静了。"
        - "妈的。"
        - "又来了。"
      constraints:
        - "每段正文最多 1-2 处不完整句"
        - "不完整句必须在上下文中意思清晰"
        - "散文化描写段落不允许不完整句（破坏气韵）"
