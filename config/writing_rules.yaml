# =============================================================================
# 描写规范核心要求 (番茄网爽感引擎版)
# 叙事空间创作系统 v8.4
# =============================================================================

priority: "最高（爽感优先原则）"

rules:
  - id: "wr_01"
    name: "极致情绪与装逼描写"
    content: |
      必须执行极致的情绪渲染。当主角展现实力、亮出底牌或疯狂打脸时，绝不吝啬笔墨。必须详细描写：反派从嚣张到不可置信再到绝望的【心理崩塌过程】，以及周围旁观者的【极致震惊与敬畏】。这是番茄文爽感的核心。

  - id: "wr_02"
    name: "动作与特效的视觉冲击"
    content: |
      战斗描写必须充满画面感和破坏力。摒弃花拳绣腿，多用“摧枯拉朽”、“碾压”、“轰鸣”、“撕裂”等极具力量感的词汇。技能释放必须带出天地异象或恐怖的威压，强调主角出手的“无敌姿态”。

  - id: "wr_03"
    name: "杀伐果断与物理反馈"
    content: |
      主角对待敌人必须秋风扫落叶般无情。禁止磨叽和圣母说教。战斗结果的描写要干脆利落，如“血雾炸开”、“瞬间秒杀”、“尸体砸碎地面”，强调力量的悬殊，但不渲染过度折磨的恶心细节。

  - id: "wr_04"
    name: "金手指/奖励的具象化诱惑"
    content: |
      当主角获得系统奖励、极品装备或天材地宝时，必须用大量华丽、神圣、极具诱惑力的词汇去描写物品的质感、光泽和散发出的恐怖气息。要让读者隔着屏幕都能感受到这件物品的“牛逼”和“珍贵”。

  - id: "wr_05"
    name: "微观神态与破防递进"
    content: |
      反派的反应必须层层递进：嘲讽冷笑 -> 察觉不对时的眉头微皱 -> 底牌被破时的瞳孔地震 -> 最终面临死亡或破产时的跪地求饶与裤裆湿润。反差越大，爽感越足。

  - id: "wr_06"
    name: "配角的工具人属性"
    content: |
      除了女主和核心反派，其他路人配角的唯一作用就是“倒吸一口凉气”、“惊呼不可能”或者在主角装逼后进行“专业的科普与吹捧”。合理利用路人之口来侧面烘托主角的强大。

  - id: "wr_07"
    name: "爽点密度与间隔约束"
    content: |
      爽点必须形成可感知节奏。要求：
      1) 连续章节中，爽点间隔不得超过3章；
      2) 每章至少要有一个可识别的小兑现（信息、地位、资源、反制、反转之一）；
      3) 每5章至少出现一次大兑现（压制关系逆转、阶段敌人崩盘、重大资源入手）。

  - id: "wr_08"
    name: "五感平衡与具身细节"
    content: |
      非对话叙述段不得只依赖视觉描写。要求每个核心场景至少补齐一种非视觉感官：听觉、嗅觉、触觉、温度或味觉。
      战斗场景优先补听觉与触觉反馈；日常场景优先补环境音与气味线索；情绪场景优先补身体反应与温度感。

sound_description:
  allowed_chars: ["嘶", "轰", "砰", "咔嚓", "哧", "铮"]
  connectors: ["——", "……"]
  usage_rule: |
    声音描写主要用于强化战斗的破坏力（如：轰！大地震颤）、武器的锐利（铮！剑鸣九霄）以及旁观者的震惊（全场响起一片倒吸冷气的嘶嘶声）。严禁出现涉黄娇喘。

reduce_non_critical:
  description: |
    彻底砍掉非关键描写：禁止大段的赶路过程、吃喝拉撒、无意义的寒暄。场景一旦切换，直接进入下一个产生冲突或获取利益的核心事件点。

character_appearance:
  first_appearance: "核心女性角色或大反派首次出场，需用极简但极具特点的词汇勾勒出其气质（如：冰山校花、上位者的威压）。"
  subsequent: "主角出场时，多描写其从容不迫、云淡风轻的神态，与周围人的慌乱形成鲜明对比。"

narration_style:
  immersion: "必须完全代入番茄爆款作者的语感，文字要有煽动性，节奏要快如闪电。"
  style: "短句为主，段落极碎。高潮部分句号多、逗号少，营造令人窒息的紧凑感和酣畅淋漓的阅读体验。"

system_text_format:
  # wr_09 系统文格式规范（适用于系统流、游戏化、觉醒类题材）
  id: "wr_09"
  name: "系统界面文字格式规范"
  content: |
    系统弹窗、任务面板、属性栏等界面文字必须遵守以下格式与节奏规范：
    1. 信息密度控制：单次系统弹窗展示信息不超过 4 条；多则拆分为多次触发，形成"系统连弹"节奏。
    2. 格式感强化：使用分隔线（---）、方括号（【】）或特殊符号（▶/★/⚠）增强视觉层次感。
    3. 倒计时压迫感：凡涉及限时任务或危机推进，必须以"倒计时"或"剩余时间"结尾，强化紧迫感。
    4. 奖励具象化：系统奖励必须以具体数值或物品名称呈现，禁止用模糊描述（如"丰厚奖励"）代替。
    5. 系统腔调一致性：全书系统界面的语气、用词风格必须统一，禁止同作出现"任务""使命""目标"混用的情况。
pov_lock:
  id: "wr_10"
  name: "视角感知维度硬锁定"
  priority: "高（仅次于爽感优先原则）"
  content: |
    默认强制使用第三人称有限视角（Limited Third-Person POV）。
    除非场景卡中 viewpoint_character 明确标注为"全知"或用户指令要求切换。

    硬约束：
    1. 只能描写当前视点人物肉眼看到的、耳朵听到的、皮肤感觉到的事物。
    2. 严禁越权描写对手此刻的内心独白（除非对手大声说出来、或通过神态动作让视点人物推断）。
    3. 严禁使用"他不知道的是..."、"而此时在另一边..."等全知视角剧透句式。
    4. 对手的情绪只能通过外显行为（表情、动作、语调变化）传递，视点人物可以猜测但不可确认。
    5. 允许的例外：wr_05（反派心理崩塌递进）在执行时，必须通过外显表情动作链来呈现，不直接进入反派内心。

    感官限定规则：
    - 远处发生的事件：通过声音、震动、烟尘等间接信号传递
    - 暗处/背后的威胁：通过寒意、杀气、本能警觉传递
    - 他人心理：仅通过对话、微表情、肢体语言推断

    POV 切换条件（严格控制）：
    1. 仅在章节边界允许切换视点人物
    2. 章内不得切换 POV
    3. 切换时必须在新视点首段即明确"谁在看"

# =============================================================================
# wr_11：信息消耗法则与镜头单向推进（Burn After Reading）
# 优化计划落地 — 针对"复读机"和"原地打转"顽疾
# =============================================================================
information_burn:
  id: "wr_11"
  name: "信息消耗法则与镜头单向推进"
  priority: "高（与 wr_10 同级，两者配合使用）"
  content: |
    核心叙事法则：信息出现后即告消耗，视角镜头必须单向向前推进，禁止在无新增量的情况下重复已知信息。

    【法则 A：信息阅后即焚（Burn After Reading）】
    场景卡（Scene Plan）中的环境设定（天气、地点、时间）和人物初始状态属于"一次性消耗品"。
    - 在段落开头交代完毕后，后续段落严禁无意义地重复提及。
    - 允许的例外：该环境元素直接参与了当前物理互动（例：反派的刀劈开了雨幕、主角在积水中踉跄）。
    - 违规示例：开头写了"夜雨倾盆"，结尾再写"雨还在下"——无新增量，必须删除。

    【法则 B：读者的物体恒存性（Reader Persistence）】
    假设读者拥有正常记忆。一旦角色亮出武器、确认某种情绪或处于某个环境中，严禁在同一章内反复交代同一事实。
    - 状态必须是推进的，不是循环的。
    - 违规示例：连续三段反复强调"他依然很愤怒"而无任何行动推进。
    - 正确做法：直接描写愤怒驱动的具体动作（摔杯、抽刀、开口）。

    【法则 C：镜头强制推轨（Tracking Shot）】
    视线必须跟随动作焦点移动。当战斗或追逐从A地点转移到B地点，描写焦点必须同步切换到B的具体细节。
    - 严禁回头描写A发生了什么（镜头只向前，不向后）。
    - 在新地点的第一个动作描写中必须自然带出新环境的1-2个具体感官细节。

    【执行信号词（Critic 检测用）】
    以下词组出现时，Critic Sub-Agent 必须检查是否违反本法则：
    "依然"、"还是"、"仍然"（+同一环境/状态描述）
    "再次感到"、"又想起"（+已在本章明确交代的信息）
    "如前所述"、"正如"（+已知事实重复）

  # v8.4 冲突解决：wr_11 vs ht_01（角色自嘲和对话不完美）
  ht_01_exception: |
    以下情况不视为 wr_11 违规：
    1. 角色自嘲小设计（ht_01）：角色重复提及自己的缺点或失败，这是人物常态行为而非信息重复
    2. 对话不完美表达（ht_04_ext_b）：角色误用词语、含糊其辞、打断自己，这是真实对话的天然错误
    3. 叙述者微跑题（ht_04_ext_a）：叙述者开小差引读者注意力，不属于无增量信息重复
    上述三者是 ht 规则的「有意为之」，不是复读机的机械错误。wr_11 目标是消灭无变化重复，不是消灭人物如实通述。
