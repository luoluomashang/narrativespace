version: 11.0.0
writing_rules:
  - writing 必须同时读取《文风特征指南》、世界观设定、相关人物卡片、当前章章纲、summary_index.md、memory.md
  - 优先模仿原作者语感，杜绝“总而言之 / 不可否认 / 至关重要”等 AI 套话
  - 续写必须围绕当前章骨架推进，不偷跳后续剧情
  - 优先小步推进，保证局部语感稳定，再扩写到完整章节
  - 若用户明确要求先做语感校准，可先输出 300-500 字试写片段；正式落盘时仍必须输出完整章节
  - 本章正文必须满足 state.reply_length 对应的最小中文字符数
  - 不再施加 target_platform 对应的硬上限
  - 写后摘要区必须覆盖新增设定与未兑现钩子，便于下次章纲讨论与续写
  - 输出必须严格包含 `## 本章摘要` / `## 状态变化` / `## 新增设定` / `## 未兑现钩子`
