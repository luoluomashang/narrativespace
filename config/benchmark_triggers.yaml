benchmark_groups:
  - id: bg_01
    name: historical_power_struggle
    trigger_tags: [历史, 权谋, 朝堂, 古代]
    core_logic:
      - 私人欲望必须与秩序/名分/家族义务产生碰撞
      - 关键转折需有制度与资源层因果支撑
    hard_checks:
      - 权力变动可解释
      - 关键决策有代价
      - 历史语境不悬空

  - id: bg_02
    name: contemporary_realism
    trigger_tags: [都市, 现实, 职场, 家庭, 社会]
    core_logic:
      - 冲突落点要回到生计、关系与尊严
      - 角色选择要兼顾情感与现实压力
    hard_checks:
      - 生活成本可感知
      - 冲突不是口号化议题堆砌
      - 结果改变关系或处境

  - id: bg_03
    name: suspense_mystery
    trigger_tags: [悬疑, 推理, 刑侦, 惊悚]
    core_logic:
      - 悬念负责当下压力，推理负责真相秩序
      - 线索投放必须公平且可回溯
    hard_checks:
      - 关键线索不作弊
      - 反转前有压力铺垫
      - 真相揭示后逻辑闭环

  - id: bg_04
    name: romance_growth
    trigger_tags: [言情, 恋爱, 成长, 古言, 甜虐]
    core_logic:
      - 感情线与主线任务互相施压
      - 亲密关系推进必须伴随风险或代价
    hard_checks:
      - 关系变化有桥接
      - 情感债有回收路径
      - 人设不因撒糖失真

  - id: bg_05
    name: game_survival_ensemble
    trigger_tags: [无限流, 规则怪谈, 群像, 生存, 游戏]
    core_logic:
      - 规则清晰可推演，变化有成本
      - 群像成员各自有功能与背叛阈值
    hard_checks:
      - 规则不临时改写
      - 联盟破裂有因果
      - 每轮至少一条策略线变化

  - id: bg_06
    name: literary_experimental
    trigger_tags: [文学, 实验, 严肃, 慢热]
    core_logic:
      - 形式服务主题与人物，不为炫技
      - 节奏可慢但压力不可空
    hard_checks:
      - 主题通过行动显影
      - 结构变化有必要性
      - 语言不空转

adaptive_down_weighting:
  allowed_when:
    - slow_burn
    - restrained
    - anti_formula
    - literary
  down_weight_items:
    - hook_density
    - twist_frequency
    - cliff_intensity
  keep_hard:
    - character_consistency
    - causal_coherence
    - theme_pressure
    - originality

selection_rule:
  primary_group_required: true
  support_group_max: 1
  note: 支持组用于补强，不得覆盖主承诺。