# =============================================================================
# TRPG 沉浸感配置
# 叙事空间创作系统 v8.0
# =============================================================================
# 本配置控制跑团推演模式的沉浸感增强机制
# 用户可在 .xushikj/config/ 中覆盖此文件
# =============================================================================

# -----------------------------------------------------------------------------
# 决策密度等级 — 控制每次 DM 产出的片段长度和决策点频率
# DM sub-agent 根据 scene_pressure 自动切换，用户也可手动指定
# -----------------------------------------------------------------------------
# =============================================================================
# 最高优先级：决策驱动截断原则（v8.2）
# 片段长度字数范围仅是参考上限，以下规则凌驾于一切字数设定之上
# =============================================================================
truncation_priority: |
  决策驱动截断（最高优先级，凌驾于所有字数设定之上）：
  当叙事推进到以下任一临界点时，无论已写多少字（哪怕仅写了50字），立即截断输出：
  ① 敌人的攻击/子弹/法术到达——主角需要闪避/格挡/反击
  ② 对手开出条件/发出命令/抛出问题——主角需要回应
  ③ 关键 NPC 求救/背叛/揭露秘密——主角需要做出反应
  ④ 战局出现转折点（增援/退路被断/形势逆转）——需要做战术选择
  ⑤ 任何需要主角说出关键台词的对话节点
  ⑥ 任何需要主角做出选择的瞬间
  
  截断之后立即输出决策选项，把球交给玩家。
  字数范围是「只要不超过上限」，而不是「必须达到下限」。
  宁可输出50字就截断，也不要为凑字数替玩家推进剧情。

anti_proxy_rule: |
  DM 代理防护（最高优先级，等同 truncation_priority）：
  DM 是导演，不是编剧。职责是「把舞台搭好、把危机推到主角面前、然后闭嘴」。
  
  绝对禁止的代理行为：
  ① 替主角下结论（「他决定了……」「他选择了……」）
  ② 替主角说出关键台词（「他冷声道……」后接主角的全部意思表达完毕）
  ③ 替主角推进到下一个事件（「当天下午，他来到了……」——跳了一大段时间线）
  ④ 在决策点未让用户选择的情况下继续推进剧情
  ⑤ 以描述「主角内心已做好决定」来替代让用户做决定
  
  判断标准：读完这段文字，用户还有什么可以决定的吗？
  如果答案是「没什么了，都写完了」——那就是写多了。

decision_density:
  dense:
    name: "密集决策"
    fragment_length: "50-150字"
    trigger_pressure: "high"
    description: "战斗/对峙/生死抉择/关键对话中，几乎每一步都需要用户介入。写到下一个需要玩家选择的节点就立即停止，无论字数"
    applicable_scenes:
      - "combat"
      - "confrontation"
      - "life_or_death"
      - "critical_negotiation"
      - "betrayal_reveal"

  normal:
    name: "常规决策"
    fragment_length: "150-300字"
    trigger_pressure: "medium"
    description: "常规推进场景，写到关键决策节点即截断。字数范围是上限参考，不是下限目标"
    applicable_scenes:
      - "investigation"
      - "social_interaction"
      - "exploration"
      - "mild_conflict"

  sparse:
    name: "宽松决策"
    fragment_length: "400-800字"
    trigger_pressure: "low"
    description: "过渡/休息/赶路场景，DM 可连续叙述后再给出选择。但一旦出现决策点，仍须立即截断"
    applicable_scenes:
      - "travel"
      - "rest"
      - "daily_routine"
      - "setup"
      - "aftermath"

  auto_switch_rules:
    - "DM sub-agent 根据 orchestrator 传入的 scene_pressure 值自动选择密度"
    - "scene_pressure >= 8：dense"
    - "4 <= scene_pressure < 8：normal"
    - "scene_pressure < 4：sparse"
    - "用户可通过 /密度 dense|normal|sparse 手动覆盖"
    - "手动覆盖持续到下一次场景切换或用户再次指定"
    - "无论当前密度等级，truncation_priority 规则始终优先于字数下限"

# -----------------------------------------------------------------------------
# 多层决策类型 — 不同类型的决策点对应不同的选项呈现方式
# DM sub-agent 根据截断点的剧情性质选择最匹配的决策类型
# -----------------------------------------------------------------------------
decision_types:
  action:
    name: "行动决策"
    icon: "⚔️"
    description: "主角做什么（攻击/逃跑/搜索/使用技能等）"
    option_count: "2-3"
    format: "[选项 A - {行动标签}]：{具体行动描述}"

  dialogue:
    name: "对话决策"
    icon: "💬"
    description: "主角说什么——给出2-3句不同语气/策略的台词选项"
    option_count: "2-3"
    format: "[选项 A - {语气标签}]：「{台词原文}」"
    notes: "台词必须体现角色性格，不同选项的语气/策略差异必须明显"

  attitude:
    name: "态度决策"
    icon: "🎭"
    description: "主角用什么姿态/表情面对当前局面"
    option_count: "2-4"
    format: "[选项 A - {态度}]：{具体表现描述}"
    examples:
      - "冷漠无视"
      - "压抑怒火"
      - "轻蔑一笑"
      - "坦然面对"
      - "故作镇定"

  tactical:
    name: "战术微操"
    icon: "🎯"
    description: "战斗中的即时反应——闪避方向/反击目标/技能选择/防御策略"
    option_count: "2-3"
    format: "[选项 A - {战术}]：{具体操作及预期效果}"
    notes: "只在 dense 密度的战斗场景中使用，非战斗场景禁止出现"

  inner:
    name: "内心决策"
    icon: "💭"
    description: "心理转变节点——原谅/记恨/动摇/坚定/释怀/执念加深"
    option_count: "2-3"
    format: "[选项 A - {心理方向}]：{内心变化描述及后续影响暗示}"
    notes: "影响角色后续行为逻辑，选择结果记入 KB 角色状态"

  type_auto_select:
    - "战斗中敌人进攻 → tactical"
    - "NPC 抛出问题/条件/挑衅 → dialogue"
    - "主角受到重大打击/背叛/意外 → inner"
    - "社交场合需要表态 → attitude"
    - "其他默认 → action"

# -----------------------------------------------------------------------------
# 即时干预系统（INTERRUPT）— 用户可在 DM 产出过程中随时打断
# 与 ROLLBACK 互补：ROLLBACK 是事后回退，INTERRUPT 是实时干预
# -----------------------------------------------------------------------------
interrupt_system:
  enabled: true
  trigger_words:
    - "等等"
    - "停"
    - "暂停"
    - "我要插嘴"
    - "换个方向"
    - "不对"
    - "我想改"
  behavior: |
    触发 INTERRUPT 后：
    1. 截断当前回合的 DM 产出（已写入 WIP 的部分保留）
    2. 向用户询问新的意图："你想让主角做什么？"
    3. 以用户新指令替代原决策，重新调用 DM sub-agent
    4. 新产出覆盖被截断的片段（而非追加）
    5. turn_history 中被截断的条目标记为 interrupted，保留供审计
  notes:
    - "INTERRUPT 不消耗 ROLLBACK 次数"
    - "连续 INTERRUPT 不限制次数"
    - "INTERRUPT 只影响当前回合，不影响历史回合"

# -----------------------------------------------------------------------------
# 骰子机制（全模块可选）— 增加TRPG紧张感
# 默认关闭，用户可在 user_settings 中启用
# -----------------------------------------------------------------------------
dice_system:
  enabled: false
  description: "为关键行动引入成功率可视化，增加紧张感和博弈性"
  activation: "用户说 `/骰子开` 或在 user_settings 中 dice_system: true"

  check_types:
    strength_check:
      name: "力量检定"
      formula: "基于角色当前战力等级 vs 目标难度等级"
      display: "💪 力量检定 — 成功率约 {X}%"
    
    perception_check:
      name: "感知检定"
      formula: "基于角色感知属性 + 环境因素"
      display: "👁 感知检定 — 成功率约 {X}%"
    
    social_check:
      name: "社交检定"
      formula: "基于角色社会地位/口才 vs 对方态度"
      display: "🗣 社交检定 — 成功率约 {X}%"
    
    luck_check:
      name: "运气检定"
      formula: "纯随机事件"
      display: "🎲 运气检定 — 成功率约 {X}%"

  probability_display:
    high: "成功率 ≥ 70% — 几乎稳操胜券"
    medium: "成功率 40-69% — 有风险但值得搏一搏"
    low: "成功率 < 40% — ⚠ 高风险，可能付出惨痛代价"
  
  failure_consequence: |
    检定失败时，DM 必须给予合理的失败后果，但不得一击致命（除非 narrative_tension ≥ 9 且场景标记为 life_or_death）。
    失败后果优先选择：局面恶化、暴露弱点、丢失资源、时间浪费、关系受损。

# -----------------------------------------------------------------------------
# 后果预警系统 — 高风险选项标注
# -----------------------------------------------------------------------------
consequence_preview:
  enabled: true
  risk_levels:
    safe:
      icon: ""
      description: "无特殊标注"
    risky:
      icon: "⚠"
      description: "有代价但可控"
      display: "⚠ 有风险：{简要后果描述}"
    dangerous:
      icon: "☠"
      description: "可能造成不可逆后果"
      display: "☠ 高危：{简要后果描述}"
  
  rules:
    - "至少一个选项必须是 safe，不允许所有选项都标注为 dangerous"
    - "dangerous 选项最多 1 个"
    - "只在 dense 和 normal 密度下显示后果预警，sparse 模式简化"
