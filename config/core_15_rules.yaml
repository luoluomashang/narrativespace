version: "1.0"
description: "Core rule pack for generation-time injection (keep concise)."

rules:
  - id: c15_01
    text: "中文输出，除必要标识符外不使用英文叙述。"
  - id: c15_02
    text: "保持单一视角，禁止章内越权描写他人内心。"
  - id: c15_03
    text: "章末必须提供有效钩子（悬念/危机/反转之一）。"
  - id: c15_04
    text: "段落控制在手机端易读长度，避免大段文字墙。"
  - id: c15_05
    text: "禁止连续三句同构句式，保持长短句交错。"
  - id: c15_06
    text: "避免“心想/暗想”标签化心理描写，优先自由间接引语。"
  - id: c15_07
    text: "禁止论文腔、客服腔、说明书腔。"
  - id: c15_08
    text: "开篇尽快进入冲突或行动，不复述上一章。"
  - id: c15_09
    text: "同一章内避免无新增信息的重复解释。"
  - id: c15_10
    text: "关键对话需体现角色差异和压力反应。"
  - id: c15_11
    text: "每个核心场景至少加入一种非视觉感官线索。"
  - id: c15_12
    text: "互动模式下不得替用户/主角做关键决策。"
  - id: c15_13
    text: "用户未授权时不得擅自补全命名设定与数值细节。"
  - id: c15_14
    text: "禁止章内POV切换，视点变更仅允许章节边界。"
  - id: c15_15
    text: "输出纯正文，不附带创作解释和流程说明。"
