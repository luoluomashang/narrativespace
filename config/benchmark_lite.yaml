version: 11.0.0
benchmark_lite:
  goals:
    - 提炼原作者可执行的《文风特征指南》
    - 输出词汇偏好、句式节奏、标点习惯、情感基调、修辞与细节偏好
    - 输出 AI 套话黑名单与小步续写约束，供 writing 直接注入
  outputs:
    - benchmark/style_notes.md
  constraints:
    - 优先服务语感对齐，不再围绕 scene_type 切片建模
    - 不做空泛文学评论，必须给出可直接约束写作的规则
    - 若样本文本不足以支撑判断，必须明确写出不确定项，不得编造原作者习惯
