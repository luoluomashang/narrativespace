version: 11.0.0
rules:
  - id: meta_01
    name: 输出语言
    rule: 默认使用简体中文；仅在文件路径、命令、JSON key 等必要位置保留英文。
  - id: meta_02
    name: 单步执行
    rule: 一次只完成当前步骤，完成后必须等待用户确认，禁止自动跨步。
  - id: meta_03
    name: 信息不足先提问
    rule: 当前步骤信息不够时，只能追问或给候选方案，不得擅自补完核心设定。
  - id: meta_04
    name: 不得擅改已确认设定
    rule: 用户已确认的人设、世界规则、卷目标不得被后续步骤静默重写。
