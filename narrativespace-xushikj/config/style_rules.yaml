# =============================================================================
# 语言风格自然化与降重模块 (番茄特化版)
# 叙事空间创作系统 v7.0
# =============================================================================

core_goal: |
  本模块旨在打造最适合番茄小说网手机端阅读的文本。核心目标是：极高的阅读流畅度、极低的理解门槛、强烈的画面感和情绪感染力。文字要“白”且“燃”。

style_directives:
  - name: "极简白话与下沉表达"
    content: "小说正文必须使用极度通俗易懂的白话文。禁止使用晦涩的成语、生僻字或复杂的修辞手法。能用大白话讲清楚的动作和装逼打脸桥段，绝不用文言或文艺腔调。"

  - name: "情绪化与感官刺激"
    content: "放大关键节点的感官描写。当主角获得宝物、击败强敌或展现金手指时，必须用具有视觉冲击力的词汇（如：轰鸣、炸裂、摧枯拉朽）来渲染氛围，强化读者的爽感。"

  - name: "对话推动剧情"
    content: "大量使用极具性格色彩的对话来推动情节。反派的嘲讽要直白拉仇恨，主角的回击要干脆利落，不拖泥带水。"

  - name: "高级心理描写（禁止生硬心想）"
    content: "严禁滥用 “……”他心想、“……”他暗想 这种带引号和提示语的生硬格式。尽量使用自由间接引语，将角色的心理活动直接融入旁白叙述中。例如：不要写『“这下麻烦了，”他心想。』，直接写『这下麻烦了。他微微皱眉。』"

  - name: "拒绝翻译腔与公文逻辑"
    content: |
      绝对禁止在文学叙事中使用外语残留（如 subtly, playfully）以及强行对比和逻辑连词（如：不是……而是……、总而言之、显而易见、毋庸置疑）。
      直接陈述客观事实，把判断的权力留给读者。

  - name: "禁止古早网文的『脸谱化描写套路』"
    content: |
      禁止将特定的名词、动词与形容词进行恶俗的“套路化绑定”。包括但不限于：
      - 禁止“眼/目光/眼神” + “闪过/精光/寒芒”
      - 禁止“嘴角” + “勾起/一丝/弧度”
      - 禁止“呼吸” + “一滞/停顿”
      - 禁止“娇妻/霸总疼痛文学”组合（如：四肢百骸的痉挛、细密的汗珠、眼眶微红地咬住下唇、小兽般的呜咽）
      写实即可，该皱眉就皱眉，该拔剑就拔剑，拒绝油腻。

  - name: "禁止滥用比喻与意象堆砌"
    content: |
      禁止在紧张的叙事和战斗中插入啰嗦的意象比喻（如：像投入古井的石子泛起涟漪、像潮湿季节里疯长的藤蔓、像溺水之人抓住浮木）。
      战斗和破局场景需要的是极高密度的动词（砸、撕裂、塌陷），而不是堆砌华丽但无用的修饰语。

structure_directives:
  - name: "手机端视觉排版（强迫断句）"
    content: "[强制] 必须适应手机屏幕阅读！多用短句，单行成段，每个段落绝对不超过 3-4 行。严禁出现密密麻麻的文字块，通过频繁的回车换行来加快阅读节奏。"

  - name: "打破AI说教感"
    content: "彻底清除'综上所述'、'不可否认'等学术腔调，小说文本中绝不能有任何总结陈词的机器感。"

  - name: "高潮节奏加速"
    content: "在战斗或情绪爆发的高潮戏份中，进一步缩短句式，多用动词和名词，减少形容词，营造令人喘不过气来的紧凑节奏感。"
    
  - name: "标点与节奏"
    content: "【动态标点与长短句节奏】严禁全篇泛滥使用句号（。）制造‘电报式’的短句堆砌。规则如下：1. 同一时间线内连续发生的动作、神态变化，必须用逗号（，）连接（例如：‘林浅浅双眼猛然睁开，冰蓝色的光芒在眼底炸裂，手腕顺势一抖，长剑已然挥出。’）；2. 句号只能用于一个完整意群的结束，或用于极度震惊、生死瞬间的致命停顿；3. 强制要求长短句交错，禁止连续出现3个以上结构相同的简单句（主谓宾+句号）。" 

  - name: "对话去AI化（硬约束）"
    content: "对话必须口语化并具备角色差异。允许不完整句、改口、打断、语气词（嗯/啊/呢/吧/嘛）。禁止论文腔和客服腔（如‘我认为我们应当’、‘您的观点非常中肯’）。"

  - name: "句式变化硬约束"
    content: "禁止连续3句使用同构句式。每3-5句至少有1句短句（<=10字）用于节奏切分。段落长度要有波动，避免连续段落字数几乎一致造成机器感。"

warning_words:
  principle: |
    核心原则：规避所有会让读者感到出戏、拖沓或油腻的词汇。番茄文讲究的是拳拳到肉、直指人心。

  list:
    - "值得注意的是"
    - "综上所述"
    - "本质上"
    - "不可否认"
    - "摩挲"
    - "融入夜色中"
    - "金属摩擦般的质感"
    - "嘴角勾起一抹邪魅的冷笑"
    - "深邃的眼眸"
    - "倒吸一口凉气"  # 除非是刻意使用的经典网文梗，否则控制频率
    - "此子恐怖如斯"  # 同上
    - "认真"
    - "火花"
    - "光芒"
    - "夜色如墨"
    - "眼神"
    - "不容置疑"
    - "挑眉"
    - "低声重复"
    - "不易察觉"
    - "摩擦"
    - "一丝"
    - "有些"
    - "好像"
    - "似的"
    - "如同"
    - "仿佛"
    - "说"
    - "道"
    - "勾起嘴角"
    - "坚定"
    - "知道"
    - "明白"
    - "深吸一口气"
    - "坚毅"
    - "肯定"
    - "金属"
    - "额角"
    - "闪过"
    - "面庞"
    - "发光"
    - "衣服下摆"
    - "警惕"
    - "微微"
    - "轻微"
    - "惊恐"
    # 宏大空泛修饰词（新增）
    - "璀璨夺目"
    - "宛如星辰"
    - "深邃如海"
    - "交织在一起"
    - "令人叹为观止"
    - "无与伦比的"
    - "不可思议的"
    # 机械逻辑连接词（新增）
    - "首先"
    - "其次"
    - "最后"
    - "总而言之"
    - "毋庸置疑"
    - "显而易见"
    - "令人深思的是"
    # 抽象情绪总结（新增）
    - "一股莫名的情绪涌上心头"
    - "空气中弥漫着极其紧张的气氛"
    - "这一刻展现了人性的光辉"
    - "这注定是一场改变命运的旅程"
    # 刻板套路动作（新增）
    - "眼中闪过一丝精光"
    - "眼中闪过寒芒"
    - "嘴角微微勾起一抹难以察觉的弧度"
    - "眉头微微一皱"
    - “碰撞出……的火花” 
    - “宛如一幅……的画卷”
    # ====== 外语残留与大模型底层翻译腔 ======
    - "subtly"
    - "gently"
    - "playfully"
    - "amused"
    - "cố gắng"
    - "почти"
    # ====== 强行对比与模糊化词汇（推卸叙事责任） ======
    - "不是……而是"
    - "几乎看不见"
    - "若有若无"
    - "并不存在的"
    - "鲜明的对比"
    # ====== 泛滥的微表情与刻板动作 ======
    - "指节发白"
    - "弧度"
    - "嘴角勾起"
    - "骨节"
    - "一顿"
    - "低笑"
    - "无意识的勾住"
    - "不自觉的绞在一起"
    - "弓起"
    - "随之抖动"
    - "扣子"
    - "一颗，两颗，三颗盘扣"
    # ====== 滥用的感官与生理痛感词（生硬的疼痛文学） ======
    - "生理性"
    - "生理性的"
    - "袅袅热气"
    - "水光潋滟"
    - "长年磨出的薄茧"
    - "细若蚊呐"
    - "呜咽"
    # ====== 烂俗比喻与意象堆砌 ======
    - "雨后青草一般的"
    - "潮湿季节里疯长的有毒藤蔓"
    - "像溺水之人抓住浮木一般"
    - "淬毒的刀子一样"
    - "像根针一样扎进"
    - "裹挟着蜜糖"
    # ====== 极端情绪与过度修饰（强行拉升张力） ======
    - "穿云裂石的尖叫"
    - "揉入骨血"
    - "氤氲"
    # ====== 权力上位者/霸总视角专属套路 ======
    - "充满了惩罚性与占有欲"

  meaningless_detail_ban:
    - "绝对禁止长篇大论的风景描写、天气描写或建筑构造描写，除非它直接关系到即将发生的战斗或寻宝。"
    - "禁止对配角的内心戏进行长篇剖析，配角的存在主要是为了衬托主角的牛逼或推进剧情。"
    - "禁止无意义的过渡性废话，如'时间过得飞快'、'一夜无话'等，场景切换要像电影剪辑一样干脆。"
    - "章节结尾必须‘戛然而止’。绝对禁止在段落或章节结尾使用比喻句进行抒情（如‘像在黑暗中看到一丝光’）、感叹或哲理总结。结尾必须落在一个未完的动作、一句悬念十足的台词，或一个突发的变故上。"
    - "专业背景（如物理博士）应体现在主角‘破局的独特视角’和‘解决问题的方法’上，严禁为了凸显人设而在严肃、紧张的场景中进行无意义的、出戏的内心专业词汇吐槽。"
    - "【禁止解释性旁白】严禁在描写完动作、比喻或台词后，追加‘这是实话’、‘这很合理’、‘很烂的借口’等总结性评价。把判断的权力交给读者，只呈现客观事实和角色的直接反应，绝对不要用上帝视角去‘解说’剧情。"
    - "【禁止‘的’字与顿号连用】绝对禁止使用『AA的、BB的』这种用顿号连接多个形容词的句式（例如‘涣散的、模糊的’）。要求：要么将形容词合并精简（如‘璀璨凝实’），要么只保留一个最核心的形容词。全篇必须严格控制‘的’字的出现频率，提升文本密度。"
    - "【禁止碎片化排版】虽然要求段落简短，但绝对禁止将一个完整的逻辑或连续的数据拆分成多个单句独占一行（所谓的‘诗歌体’）。极短句独占一行只能用于极致的震惊、生死的瞬间或决定性的动作，严禁滥用。"

anti_ai_scan_categories:
  - id: "aa_01"
    name: "连接词与逻辑拐棍"
    action: "delete_or_rewrite"
    examples: ["首先", "其次", "最后", "总而言之", "综上所述", "值得注意的是"]

  - id: "aa_02"
    name: "商业黑话"
    action: "force_replace"
    examples: ["赋能", "闭环", "抓手", "底层逻辑", "矩阵", "复盘"]

  - id: "aa_03"
    name: "对称句式模板"
    action: "frequency_limit"
    examples: ["不是……而是", "既……又", "一方面……另一方面", "与其说……不如说"]

  - id: "aa_04"
    name: "情绪三件套模板"
    action: "force_replace"
    examples: ["手心出汗", "心跳加速", "喉咙发干", "月光如水", "怒火中烧"]

  - id: "aa_05"
    name: "总结升华句"
    action: "delete"
    examples: ["由此可见", "不难发现", "这充分说明", "总之"]

  - id: "aa_06"
    name: "空泛修饰词"
    action: "delete_or_concretize"
    examples: ["深入人心", "引发深思", "全方位", "多维度", "本质上"]

  - id: "aa_07"
    name: "脸谱化动作词"
    action: "downweight"
    examples: ["微微一笑", "嘴角勾起", "眼中闪过一丝", "深吸一口气", "紧握双拳"]

structural_blacklist:
  id: "sb_01"
  name: "句式结构反向约束黑名单"
  priority: "最高（与 warning_words 同级）"
  description: "文风控制不仅规定'要怎么写'，更明确'绝不能怎么写'。以下为大模型顽固高频句式结构，章节正文中严禁出现。"

  banned_sentence_patterns:
    - pattern: "不仅……更……"
      reason: "过度书面化排比议论句，破坏小说叙事感"
    - pattern: "即便……也……"
      reason: "让步复句属于议论文体，与番茄文风格不兼容"
    - pattern: "与此同时"
      reason: "生硬场景过渡词，应直接用动作/对话切入新场景"
    - pattern: "画面一转"
      reason: "剧本批注式过渡，暴露 AI 叙事中介人格"
    - pattern: "某种意义上"
      reason: "学术腔模糊评价，小说中无用"
    - pattern: "事实上"
      reason: "说教式插入，打断叙事节奏"
    - pattern: "值得一提的是"
      reason: "同上，新闻稿痕迹"
    - pattern: "就在这时"
      reason: "过度使用导致节奏机械化，可改为直接动作句切入"
      frequency_limit: "单章不超过 1 次"
    - pattern: "一股……涌上心头"
      reason: "AI 高频情绪套路，用具身反应替代"
    - pattern: "他/她不知道的是"
      reason: "全知视角剧透句式，破坏有限视角代入感"

  enforcement: "sub-agent 写作时禁止使用；HC6 扫描时命中即标记 WARN"

pacing_metrics:
  id: "pm_01"
  name: "文风工程化量化指标"
  description: "将文风转化为可量化的工程指标，大模型对具体数字的执行力远高于形容词。"

  sentence_length:
    combat_scenes:
      avg_max: 15
      unit: "字/句"
      rule: "动作场景中平均句长不得超过 15 字"
    daily_scenes:
      avg_max: 25
      unit: "字/句"
      rule: "日常场景平均句长放宽至 25 字，但仍禁止超过 40 字的长句"
    dialogue:
      avg_max: 20
      unit: "字/句"
      rule: "对话单句不超过 20 字，超过时必须被打断或换行"

  paragraph_density:
    max_lines: 3
    max_chars: 80
    rule: "全章没有任何一个自然段可以超过 3 行（约 80 字），高潮段落进一步压缩到 2 行"

  punctuation_ratio:
    comma_to_period:
      target: "1:1"
      tolerance: "0.8:1 ~ 1.2:1"
      rule: "逗号与句号的比例控制在 1:1 左右，避免全篇逗号泛滥或句号电报"

  verb_density:
    combat_scenes:
      verb_noun_ratio_min: 0.80
      rule: "紧张场景中动词+名词的占比必须达到 80% 以上，严格限制形容词和副词"
    emotional_scenes:
      verb_noun_ratio_min: 0.60
      rule: "情绪场景适当放宽，但动词+名词仍应占主导"

  enforcement: "章节写作 sub-agent 自检时作为辅助参考指标，不作为 halt 条件"

self_check:
  description: "输出正文前，快速核对番茄爆款指标："
  questions:
    - "这段文字在手机上看起来会是一大坨吗？如果是，立刻拆分成短段落。"
    - "这里的爽点给得够不够直接？有没有绕弯子？"
    - "反派的脸被打得够不够响？"

logic_coherence:
  rules:
    - "爽感逻辑高于一切：在确保基础世界观不崩塌的前提下，一切设定的解释都要为'让主角装一个完美的逼'或'获取巨大收益'服务。"
    - "必须通过[动态实体知识库]进行一致性校验，确保金手指的冷却时间、获得的战利品数量和已掌握的技能不出现前后矛盾。"
    - "严禁无故给主角降智以强行制造冲突。危机必须来自于外部势力的强大或信息差，而非主角自身的愚蠢。"