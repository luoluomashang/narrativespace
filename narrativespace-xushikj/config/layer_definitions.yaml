# Layer-2 深化场景定义
# 叙事空间创作系统 v3.0
#
# Layer-1: 常规推进场景（日常冲突、配角互动、信息铺垫）
# Layer-2: 核心冲突场景（主角与反派对垒、重大转折、伏笔回收、生死乱局）
#
# Layer-2场景须启动 sequential-thinking 工具进行"三分支思维树"推演

layer_classification:
  
  layer_1_definition:
    name: "常规推进场景"
    characteristics:
      - 主角进度单向推进
      - 配角互动或信息收集
      - 无主要反派直接对抗
      - 矛盾因果链单线
      - 视点稳定
    scene_types:
      - "日常修炼/升级"
      - "技能获取与测试"
      - "配角感情线"
      - "商业谈判"
      - "社交铺垫"
      - "环境探索"
    workflow:
      - 规划 → 直接场景拆解 → 写作 (√无需ToT)
    example: |
      主角在银行开户；与新任务发布NPC对话；升级系统；
      女主角的日常课程；反派手下的日常侦查（非决战）
  
  layer_2_definition:
    name: "核心冲突场景（深化场景）"
    characteristics:
      - 主角与反派的直接对抗或心理博弈
      - 多条信息线汇聚的关键时刻（反转点）
      - 角色身份/目标的根本冲突
      - 伏笔的重要回收或升级
      - 生死、大义、道德等极限压力
      - 多条后续路径的分岔点
    scene_types:
      - "初次交锋"
      - "背叛揭露"
      - "高层权力争端"
      - "追杀逃脱"
      - "绝地反杀"
      - "真相揭示"
      - "重要角色陨落"
      - "下一阶段的关键选择"
      - "全势力格局重组"
    workflow:
      - 规划 → 启动 ToT 工具 → 三分支推演 → 选一条 → 周密场景拆解 → 写作 (√必须ToT)
    example: |
      主角首次对面反派、并发现其真实身份；
      主角被迫选择：救朋友还是救国家；
      女主发现男主的真实背景；
      重要角色在战斗中陨落；
      全世界发现主角天选者身份

  identification_checklist:
    # 用户或orchestrator快速判断是否为Layer-2
    question_1: "本场景中是否有主角与反派的直接对抗或深度心理战？"
    question_2: "本场景是否会改变故事的大格局或主角的核心目标？"
    question_3: "本场景涉及的伏笔是否是'长线伏笔'或'生死攸关'的伏笔？"
    question_4: "本场景结束后，故事会出现多条可能的后续路径吗（分岔点）？"
    question_5: "这个场景之后，至少有一个重要角色、关系、胜負或秘密会发生质变吗？"
    
    note: "若上述问题中≥3个答案为'是'，则定义为Layer-2"

tot_framework:
  name: "三分支思维树（ToT）推演框架"
  
  branch_1:
    name: "常规破局"
    shorthand: "Conventional Victory Path"
    description: |
      主角基于目前掌握的所有信息，采用最直接、最显而易见的策略突破困境。
      这是读者最容易预测的方案，但通常不会是作品采用的最终方案。
    guidance: |
      问题：主角当前的核心优势是什么？如果直接用优势硬刚，会发生什么？
      要求：推演完整的因果链，包括反派的合理反制，以及主角是否能一路绿灯
    outcome_example: "系统直接碾压，反派无力反抗"
    foresee_issues: "太乏味，无爽感层次，不够智斗"
    
  branch_2:
    name: "智斗破局"
    shorthand: "Tactical Victory Path"
    description: |
      主角利用信息差、规则漏洞、心理战、资源整合等非暴力手段，
      在表面力量对比处于劣势的情况下，以少胜多。
      这是"爽感最大化"的路径：敌人看起来无敌，但实际有致命弱点。
    guidance: |
      问题：反派的最大弱点是什么（信息盲点、规则限制、心理执念）？
      要求：设计一个精妙的陷阱或规则破局，让主角即使实力弱也能赢
    outcome_example: "主角通过挖掘规则漏洞，反将一军；或诱敌深入后翻盘"
    foreseeable_benefit: "符合番茄'爽感最大化'的IP特质，智商在线的反派更显主角聪慧"
    
  branch_3:
    name: "反套路破局"
    shorthand: "Subversive Victory Path"
    description: |
      主角的胜利方式完全超出读者与反派的预期，打破所有上面两条路的逻辑框架。
      可能涉及第三方救场、伏笔提前引爆、全新能力激活、或干脆放弃对抗的逻辑反转。
      这是"出其不意"的路径，通常用在"反转之王"式的终局。
    guidance: |
      问题：有没有完全不同的"游戏规则"可以适用到这个困境？
      要求：设计一个大读者和作品本身都未曾想到的可能性。可行性仅次，创意最优。
    outcome_example: |
      主角根本不与反派对抗，而是破坏了他们存在的世界基础；
      或第三方突然入场，原本的敌我对立被重新划分；
      或主角激活了之前埋藏的伏笔，完全改写了对抗的维度
    benefit: "为后续多卷的故事发展留下想象空间，构建'意外之中的必然'"
    risk: "执行难度最高，需要有前期严密的伏笔铺垫"

  execution_workflow:
    step_1: |
      【制定场景评估报告】（由orchestrator负责）
      - 列出反派的核心能力、已知弱点、隐藏动机
      - 列出主角此时的已有资源、未开发潜力、可借助的盟友
      - 列出这个场景可以触发的伏笔（已植入的+新伏笔）
      
    step_2: |
      【启动sequential-thinking工具】（由模型负责）
      - 要求模型进行冗长的逻辑推演，分别推演三条分支
      - 输出每条分支的推演过程、中间转折、最终结果、对后续的影响
      
    step_3: |
      【评估三分支的一致性与爽感】（由模型负责）
      - 分支1(常规破局)：检查因果链完整性，是否会显得"无聊"
      - 分支2(智斗破局)：检查反派智商设定是否会被反向proof掉
      - 分支3(反套路破局)：检查伏笔铺垫是否充分，是否显得"突兀"
      
    step_4: |
      【用户选择方向】
      - 用户查看三条分支的推演摘要，选择一条作为正式方向
      - 选择后，orchestrator进入"标准场景拆解 → 写作"流程（不再启动ToT）
      
    step_5: |
      【生成场景规划（beat_plan）】
      - 基于选定的分支，拆解成3-5个beat（节拍）
      - 每个beat明确场景目标、角色位置、对话高潮、镜头转移
      
    step_6: |
      【进入写作流程】
      - sub-agent基于beat_plan写作
      - 同时记录"本场景采用了分支N"的信息，供后续追溯

  output_format:
    file: "scenes/layer_2_strategies_{volume}_{chapter}.md"
    content:
      - 场景战略报告 (100字)
      - 分支1推演 (300-500字)
      - 分支2推演 (300-500字)
      - 分支3推演 (300-500字)
      - 用户选择结果 (marked with ✅)
      - 最终beat_plan (list)
