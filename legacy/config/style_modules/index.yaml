loading_rules:
  objective: 按章节压力加载风格模块，避免全量注入造成噪音。
  max_active_modules:
    primary: 2
    support: 1

activation_flow:
  - 识别当前章主压力（冲突类型、读者感受目标、叙事任务）
  - 选定1个主模块，必要时增加1个协同模块
  - 若仅提升“风味”而不增强压力，不加载该模块

compatibility:
  suspense_mystery:
    note: 悬念负责现在怎么办，推理负责真相如何成立。
  romance_humor:
    note: 允许缓压，但不得抹平情感债。
  horror_suspense:
    note: 恐惧来源与风险链路需可解释，不能只堆氛围。

module_map:
  romance: romance.yaml
  suspense: suspense.yaml
  mystery: mystery.yaml
  fantasy: fantasy.yaml
  humor: humor.yaml
  horror: horror.yaml
  literary: literary.yaml

# v8.5 新增：全局作者DNA（跨项目持久层，最低优先级覆写基底）
global_dna_file: "global_author_dna.yaml"
global_dna_priority: foundation  # 基底层：低于 dna_human_*.yaml/clone_* 等所有项目级模块
override_semantics:
  note: "项目级 dna_human_*.yaml 中相同 category+id 规则自动覆写全局规则（项目 > 全局）"
  priority_chain: "cycle_quirks（tier-1, tail最强，卷级短期覆写）> dna_human_*.yaml（tier-2, supreme）> clone_*.yaml（tier-3, high）> style_modules active_modules（tier-4, medium）> global_author_dna（tier-5, foundation）> built_in_rules（tier-6, base）"

# v8.0 新增 / v9.0 升级：行文DNA模块（由 benchmark 模块自动生成，优先级 supreme）
# dna_human_*.yaml 不在 module_map 中静态注册，而是通过通配符扫描动态加载
# 加载优先级：dna_human_*.yaml（supreme）> clone_*.yaml（high）> module_map 中的风格模块（medium）
dna_module_pattern: "dna_human_*.yaml"
dna_priority: supreme

# v9.0 新增：DNA加载保障块（防止 dna_human_*.yaml 被遗漏）
dna_loading_guarantee:
  scan_per_chapter: true      # 每章写作前必须扫描，不得跳过
  scan_path: ".xushikj/config/style_modules/"
  pattern: "dna_human_*.yaml"
  on_found: "立即加载并注入 write_constraints，优先级 supreme，在 clone_*.yaml 之前执行"
  on_not_found: "跳过，不报错，继续执行其他风格加载步骤"
  enforcement_level: mandatory  # mandatory = 写作 orchestrator 必须执行此扫描，不可省略

fallback:
  rule: 无匹配时仅使用 foundational_principles + writing_rules + style_rules。