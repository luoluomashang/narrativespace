# =============================================================================
# 数据化质量评估维度（番茄特化版）
# 叙事空间创作系统 v8.2
# =============================================================================
# 与 xushikj-xiezuo/prompt.md 中八维度评分表一一对应
# qd_01~qd_08 均为番茄商业化维度，严禁与旧版文学维度混用
# =============================================================================

priority_note: |
  在追求极致情绪价值的同时，你必须从以下八个番茄商业化维度对生成内容进行自检与优化。
  当维度评估标准与"爽感"冲突时，以"爽感优先"原则覆盖文学性考量。

dimensions:
  - id: "qd_01"
    name: "爽感与情绪反馈"
    description: "主角的行为是否带来了直接、强烈的正向情绪反馈（如打脸、装逼、收获）。"
    fanqie_weight: high

  - id: "qd_02"
    name: "金手指利用率"
    description: "本章是否有效展示或利用了设定的金手指，金手指存在感是否强烈。"
    fanqie_weight: high

  - id: "qd_03"
    name: "节奏与信息密度"
    description: "剧情推进是否迅速，是否去除了无意义的冗长环境描写和路人废话。"
    fanqie_weight: high

  - id: "qd_04"
    name: "角色对话独特性"
    description: "对话是否鲜明反映角色性格，即使隐去名字也能区分说话人。"
    fanqie_weight: medium

  - id: "qd_05"
    name: "角色塑造一致性"
    description: "角色言行是否始终与其身份、背景和底层逻辑保持一致。"
    fanqie_weight: medium

  - id: "qd_06"
    name: "意境与主题匹配度"
    description: "场景描写是否服务于故事整体氛围和核心主题，画面感是否强。"
    fanqie_weight: medium

  - id: "qd_07"
    name: "章末悬念（钩子）"
    description: "章节结尾是否卡在关键转折点、危机或奖励结算前，是否具有极强的点击下一章欲望。"
    fanqie_weight: critical
    hard_threshold: 7
    # 低于 7 分时触发 WARNING，建议重写结尾 500 字

  - id: "qd_08"
    name: "语言下沉度"
    description: "用词是否白话、直白、易读，短句占比是否够高，严禁晦涩难懂的辞藻堆砌。"
    fanqie_weight: high

scoring:
  per_dimension: "1-10 分"
  passing_threshold: 64
  # 总分 >= 64（平均 8 分）为合格
  critical_check: "qd_07 < 7 → 强制 WARNING，建议重写结尾 500 字"

# ── 否决层（任意一条不达标即否决本章，不参与加权计算）──────────────────
veto_dimensions:
  description: "否决型质量门槛：以下三项任意触底，本章质量判定强制降级为 F，不计爽感得分。"
  dimensions:
    - id: "qd_veto_01"
      name: "信息差密度"
      hard_floor: 1
      description: "全章至少存在 1 处有效信息差（主角知而对手不知，读者知而主角暂不知，或读者与主角同步发现秘密）。信息差为零=章节失效。"
    - id: "qd_veto_02"
      name: "情绪调动幅度"
      hard_floor: 1
      description: "全章至少触发 1 次有效情绪波峰（愤怒/震惊/期待/笑/热血任一明显峰值）。全程情绪平稳=章节失效。"
    - id: "qd_veto_03"
      name: "金手指即时反馈率"
      hard_floor: 1
      description: "若本章涉及金手指/系统触发，必须在同章内完成至少 1 次可见收益兑现（金手指激活却无任何反馈=章节失效）。无金手指触发则此项豁免。"

# ── 张力-回报门禁（Tension-Payoff Gate）────────────────────────────────────
# 调度引擎（orchestrator）在每次生成"爽点释放场景"之前必须读取本段。
tension_payoff_gate:
  description: |
    情绪阀门：防止 AI 在铺垫不足时过早兑现爽点，导致读者情绪拉扯失效。
    Orchestrator 在场景类型为 payoff/打脸/反杀/装逼/升级/报仇 时，必须执行此检查。
  gate_threshold:
    current_tension_min: 7
    # current_tension（来自 state.json -> narrative_tension.current_tension）须 >= 7
    # 否则判定为"铺垫不足"，执行 gate_action
  gate_action:
    on_fail: |
      强制拒绝释放爽点。在本 cycle 下一章场景规划中追加 force_deepen 指令：
      "反派压力不足。必须在正式爽点章节前追加 1 章"加深危机"场景：反派完成一次重大行动/进一步打压主角，使 current_tension 达到 >= 7 后，爽点才可落地。"
    on_pass: |
      允许正常生成爽点场景。爽点落地后，orchestrator 将 current_tension 重置为 2（留存背景压力），current_expectation 降低 3 点。
  tension_update_guide:
    increase_triggers:
      - "反派重大挑衅或主角被压制"
      - "新威胁登场"
      - "资源剥夺或亲人受害"
      - "主角阶段目标失败"
    increase_amount: "+2 至 +3 / 次"
    decrease_triggers:
      - "爽点兑现（打脸/反杀/升级）"
      - "重大危机解除"
    decrease_amount: "重置为 2（基础背景压力）"
