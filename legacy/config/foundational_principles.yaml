principles:
  - id: fp_01
    name: human_truth_before_plot
    description: 关键决策必须同时可解释为角色欲望、阻力与代价，不得只为推进情节。
    checks:
      - 角色当下想要什么
      - 阻力来自何处
      - 代价是否可感知

  - id: fp_02
    name: causal_pressure_not_event_pile
    description: 章节推进应尽量体现因果压力，避免纯事件堆叠。
    checks:
      - 关键段落可用因为/因此/尽管如此串联
      - 至少一条风险或权力关系发生变化

  - id: fp_03
    name: readable_surface_deep_structure
    description: 允许复杂结构，但读者必须看得见目标、风险与情绪债。
    checks:
      - 本章目标可一句话复述
      - 本章风险可一句话复述
      - 本章情绪债可一句话复述

  - id: fp_04
    name: desire_fear_shame_debt
    description: 核心角色必须具备欲望、恐惧、羞耻点、债务与矛盾。
    checks:
      - 人设文件字段齐备
      - 本章激活至少一项压力因子

  - id: fp_05
    name: concrete_world_with_consequence
    description: 世界细节需具备行动后果，避免纯装饰信息。
    checks:
      - 至少一个细节影响行为或判断
      - 细节可回写到设定或知识库

  - id: fp_06
    name: theme_as_pressure
    description: 主题通过选择与代价体现，不通过口号说明。
    checks:
      - 本章至少一个价值冲突有行动表达
      - 冲突结果留下关系或风险后效

  - id: fp_07
    name: formal_necessity
    description: 叙事形式（视角、时序、切分）必须有功能理由。
    checks:
      - 结构变化带来信息或情绪增益
      - 非必要复杂形式应简化

  - id: fp_08
    name: language_health
    description: 避免空泛、伪深刻、口号化表达，优先可感知动作与结果。
    checks:
      - 可删减空词后语义不损
      - 抽象句可落地为具体行动

  - id: fp_09
    name: ending_pressure
    description: 长线创作需保持结局方向感，每章为结局累计后果。
    checks:
      - 本章新增或回收至少一个长期压力点
      - 章节收束后仍存在待支付债务

  - id: fp_10
    name: controlled_discovery
    description: 允许写作发现，但发现必须回写状态并修复依赖文档。
    checks:
      - 新发现是否影响角色/关系/规则
      - 影响项已写回状态或待办

refusal_signals:
  - 无前置压力支撑的强转折
  - 仅有漂亮语句但无叙事功能
  - 用解释替代冲突与行动
  - 世界信息与制度/成本/后果脱钩
  - 结尾仅制造噪音不形成义务

priority_model:
  always_on: foundational_principles
  conditional:
    - writing_rules
    - style_rules
  note: 在爽文高热模式下可提高 writing_rules 权重，但不得违反基础逻辑一致性。